# Install as /etc/nginx/snippets/cloudflare-only.conf.
# Include this inside public server blocks to prevent direct origin access.
#
# nginx-cloudflare-real-ip.conf defines this value using the preserved
# connection peer address. At this point $remote_addr is already the visitor,
# so a regular `allow` list would incorrectly block legitimate visitors.

if ($cloudflare_proxy = 0) {
    return 403;
}
