server {
    listen 80 default_server;
    server_name _;

    return 444;
}

server {
    listen 80;
    server_name eindejaarsbbq.nl www.eindejaarsbbq.nl;

    include /etc/nginx/snippets/cloudflare-only.conf;

    return 301 https://eindejaarsbbq.nl$request_uri;
}

server {
    listen 443 ssl;
    server_name eindejaarsbbq.nl www.eindejaarsbbq.nl;

    include /etc/nginx/snippets/cloudflare-only.conf;

    client_max_body_size 5M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 15s;
    server_tokens off;

    limit_conn eindejaarsbbq_connections 30;
    limit_req_status 429;

    ssl_certificate /etc/letsencrypt/live/eindejaarsbbq.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eindejaarsbbq.nl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/eindejaarsbbq/public;
    index index.php;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), display-capture=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    charset utf-8;

    location / {
        limit_req zone=eindejaarsbbq_general burst=30 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /login {
        limit_req zone=eindejaarsbbq_auth burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location = /forgot-password {
        limit_req zone=eindejaarsbbq_auth burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location = /aanmelden {
        limit_req zone=eindejaarsbbq_enrollment burst=3 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(?:env|ini|log|sql|sqlite|bak|old|orig|save|swp)$ {
        deny all;
    }
}
