# Install as /etc/nginx/conf.d/eindejaarsbbq-rate-limits.conf.
# These directives must be loaded inside Nginx's `http` context.
#
# nginx-cloudflare-real-ip.conf must also be installed. It makes
# $binary_remote_addr represent the visitor instead of a Cloudflare edge.

limit_req_zone $binary_remote_addr zone=eindejaarsbbq_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=eindejaarsbbq_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=eindejaarsbbq_enrollment:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=eindejaarsbbq_connections:10m;
